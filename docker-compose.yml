version: "3.9"

services:
    api1:
        build:
            context: .
            dockerfile: src/SimplifiedStock.API/Dockerfile
        environment:
            - ASPNETCORE_URLS=http://+:8080
            - ConnectionStrings__Default=Host=postgres;Database=StockDB;Username=postgres;Password=admin
        depends_on:
            - postgres
        restart: always
    
    api2:
        build:
            context: .
            dockerfile: src/SimplifiedStock.API/Dockerfile
        environment:
            - ASPNETCORE_URLS=http://+:8080
            - ConnectionStrings__Default=Host=postgres;Database=StockDB;Username=postgres;Password=admin
        depends_on:
            - postgres
        restart: always

    api3:
        build:
            context: .
            dockerfile: src/SimplifiedStock.API/Dockerfile
        environment:
            - ASPNETCORE_URLS=http://+:8080
            - ConnectionStrings__Default=Host=postgres;Database=StockDB;Username=postgres;Password=admin
        depends_on:
            - postgres
        restart: always
    
    postgres:
        image: postgres:latest
        environment:
            POSTGRES_DB: StockDB
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: admin
        restart: always

    nginx: 
        image: nginx:alpine
        ports:
            - "${APP_PORT}:80"
        volumes:
            - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
        depends_on:
            - api1
            - api2
            - api3
        restart: always

    

        